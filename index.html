<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b0e11; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .dashboard { display: flex; justify-content: space-around; background: #1e2329; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; border: 1px solid #444; }
        .win-text { color: #0ecb81; font-weight: bold; }
        .loss-text { color: #f6465d; font-weight: bold; }
        .scanner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .coin-card { background: #161a1e; border: 1px solid #333; padding: 10px; border-radius: 10px; font-size: 10px; min-height: 160px; transition: 0.3s; }
        .active-long { border: 2px solid #0ecb81; background: #0c2b1e; box-shadow: 0 0 10px #0ecb81; }
        .active-short { border: 2px solid #f6465d; background: #2b1111; box-shadow: 0 0 10px #f6465d; }
        .stats-box { font-size: 8px; color: #f0b90b; margin-top: 5px; background: #2b3139; padding: 4px; border-radius: 4px; }
        .history-section { margin-top: 15px; background: #1e2329; padding: 10px; border-radius: 10px; height: 180px; overflow-y: auto; border: 1px solid #333; }
        table { width: 100%; font-size: 9px; text-align: left; }
        .reset-btn { width: 100%; background: #f6465d; border: none; padding: 10px; border-radius: 5px; color: #fff; margin-top: 10px; font-weight: bold; }
        .toggle-btn { background: #0ecb81; border: none; color: white; padding: 8px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 11px; width: 100%; margin-bottom: 10px; }
        .toggle-btn.bot-off { background: #f6465d; }
    </style>
</head>
<body>

<div id="net-status" style="text-align:center; font-size:9px; color:#0ecb81; margin-bottom:5px;">🔍 ANCHORED LIQUIDITY ANCHOR BOT LIVE</div>

<button id="bot-toggle-btn" class="toggle-btn" onclick="toggleBot()">🤖 ENGINE STATUS: ON (RUNNING)</button>

<div class="dashboard">
    <div>💵 FUTURES BALANCE<br><span id="balance" style="font-size:18px; color:#f0b90b;">Syncing...</span></div>
    <div>✅ WINS: <span id="total-wins" class="win-text">0</span></div>
    <div>❌ LOSS: <span id="total-loss" class="loss-text">0</span></div>
</div>

<div id="scanner" class="scanner-grid"></div>

<div class="history-section">
    <table id="history-table">
        <thead><tr><th>COIN</th><th>TYPE</th><th>NET PNL</th><th>RES</th></tr></thead>
        <tbody id="history-body"></tbody>
    </table>
    <button class="reset-btn" onclick="resetAll()">RESET EVERYTHING</button>
</div>

<script>
    const coins = ['pepeusdt','shibusdt','bonkusdt','flokiusdt','wifusdt','dogeusdt','solusdt','btcusdt','ethusdt','nearusdt'];
    const RENDER_SERVER_URL = "https://sognalbott.vercel.app/api"; 

    let wins = parseInt(localStorage.getItem('hk_wins')) || 0;
    let losses = parseInt(localStorage.getItem('hk_loss')) || 0;
    let activeTrades = JSON.parse(localStorage.getItem('hk_active')) || {};
    let isBotOn = localStorage.getItem('hk_bot_state') !== 'OFF';
    let prevTrends = JSON.parse(localStorage.getItem('hk_prev_trends')) || {};

    const scannerEl = document.getElementById('scanner');
    coins.forEach(s => {
        const sym = s.toUpperCase();
        scannerEl.innerHTML += `
            <div class="coin-card" id="card-${sym}">
                <b style="font-size:12px;">${sym.replace('USDT','')}</b> <span id="price-${sym}" style="float:right">---</span>
                <div class="stats-box">
                    Trend Line: <span id="trend-${sym}">Analyzing...</span>
                </div>
                <div id="info-${sym}" style="display:none; margin-top:10px; border-top:1px solid #444; padding-top:5px;">
                    <div id="pnl-${sym}" style="font-size:15px; font-weight:bold;">$0.00</div>
                    <div style="font-size:8px; margin-top:3px;">
                        Entry: <span id="ent-${sym}">0</span> | Marg: $<span id="marg-${sym}">0</span><br>
                        Target: <span id="tp-${sym}" style="color:#0ecb81">0</span> | Stop: <span id="sl-${sym}" style="color:#f6465d">0</span>
                    </div>
                </div>
                <div id="sig-${sym}" style="color:#848e9c; margin-top:8px; font-size:9px;">Searching Crossover...</div>
            </div>`;
    });

    function toggleBot() {
        isBotOn = !isBotOn;
        localStorage.setItem('hk_bot_state', isBotOn ? 'ON' : 'OFF');
        const btn = document.getElementById('bot-toggle-btn');
        btn.innerText = isBotOn ? "🤖 ENGINE STATUS: ON (RUNNING)" : "⏸️ ENGINE STATUS: OFF (PAUSED)";
        btn.className = isBotOn ? "toggle-btn" : "toggle-btn bot-off";
    }

    // 📡 Real-time engine monitoring loop
    async function syncEngine() {
        try {
            const response = await fetch(RENDER_SERVER_URL);
            const data = await response.json();
            if (response.ok && data.balance) {
                document.getElementById('balance').innerText = "$" + data.balance;
            }
            
            for (let s of coins) {
                const sym = s.toUpperCase();
                const coinRes = await fetch(`${RENDER_SERVER_URL}?symbol=${sym}`);
                const coinData = await coinRes.json();
                
                if (coinRes.ok && coinData.trend !== undefined) {
                    const currentTrend = coinData.trend;
                    const ts4Value = coinData.ts4;
                    
                    document.getElementById(`trend-${sym}`).innerText = currentTrend === 1 ? "BULLISH" : "BEARISH";
                    document.getElementById(`trend-${sym}`).style.color = currentTrend === 1 ? "#0ecb81" : "#f6465d";

                    let currentPrice = parseFloat(document.getElementById(`price-${sym}`).innerText) || ts4Value;

                    if (activeTrades[sym]) {
                        updateTrade(sym, currentPrice);
                    } else if (isBotOn && Object.keys(activeTrades).length < 3) {
                        // 🎯 CRITICAL CROSSOVER TRIGGER CODE FROM PINE
                        if (prevTrends[sym] === -1 && currentTrend === 1) {
                            // Bearish se Bullish flip hua -> Exact bottom buy trigger!
                            execute(sym, currentPrice, 'LONG', ts4Value);
                        } else if (prevTrends[sym] === 1 && currentTrend === -1) {
                            // Bullish se Bearish flip hua -> Exact top sell trigger!
                            execute(sym, currentPrice, 'SHORT', ts4Value);
                        }
                    }
                    prevTrends[sym] = currentTrend;
                }
            }
            localStorage.setItem('hk_prev_trends', JSON.stringify(prevTrends));
        } catch (e) { console.error(e); }
    }

    function connect() {
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/' + coins.map(c => c + '@ticker').join('/'));
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const s = data.s, p = parseFloat(data.c);
            document.getElementById(`price-${s}`).innerText = p.toFixed(p < 0.001 ? 6 : 3);
            if (activeTrades[s]) updateTrade(s, p);
        };
        socket.onclose = () => setTimeout(connect, 3000);
    }

    function execute(s, entry, type, ts4Stop) {
        const margin = 0.10; // Fixed 10 Cents risk control allocation
        // Pine calculation logic anchors: target 2.5%, stop values match trailing calculations
        let tp = type === 'LONG' ? (entry * 1.025) : (entry * 0.975);
        let sl = ts4Stop; // Script logic automatically sets liquidity stop at ts4 line!

        activeTrades[s] = { entry, tp, sl, type, margin, leverage: 20 };
        localStorage.setItem('hk_active', JSON.stringify(activeTrades));
        
        // Render block visualization update
        document.getElementById(`card-${s}`).className = `coin-card ${type==='LONG'?'active-long':'active-short'}`;
        document.getElementById(`info-${s}`).style.display = 'block';
        document.getElementById(`ent-${s}`).innerText = entry;
        document.getElementById(`marg-${s}`).innerText = margin;
        document.getElementById(`tp-${s}`).innerText = tp.toFixed(4);
        document.getElementById(`sl-${s}`).innerText = sl.toFixed(4);
        document.getElementById(`sig-${s}`).innerText = "🚀 LIVE TRADING RUNNING";

        fetch(RENDER_SERVER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symbol: s, type, entry, tp, sl, margin })
        }).catch(e => console.error(e));
    }

    function updateTrade(s, p) {
        const t = activeTrades[s];
        let diff = t.type === 'LONG' ? (p - t.entry) : (t.entry - p);
        let pnlPct = (diff / t.entry) * 100 * t.leverage;
        let pnlUsd = (t.margin * pnlPct) / 100;
        
        const pnlEl = document.getElementById(`pnl-${s}`);
        pnlEl.innerText = (pnlUsd >= 0 ? "+" : "") + "$" + pnlUsd.toFixed(2);
        pnlEl.style.color = pnlUsd >= 0 ? "#0ecb81" : "#f6465d";

        if (pnlPct >= 50) closeTrade(s, "WIN", pnlUsd); 
        else if (pnlPct <= -35) closeTrade(s, "LOSS", pnlUsd); 
    }

    function closeTrade(s, res, profit) {
        if(res === "WIN") wins++; else losses++;
        const row = `<tr><td>${s}</td><td>${activeTrades[s].type}</td><td>${profit.toFixed(2)}</td><td>${res}</td></tr>`;
        document.getElementById('history-body').innerHTML = row + document.getElementById('history-body').innerHTML;
        document.getElementById(`card-${s}`).className = 'coin-card';
        document.getElementById(`info-${s}`).style.display = 'none';
        document.getElementById(`sig-${s}`).innerText = "Searching Crossover...";
        delete activeTrades[s];
        localStorage.setItem('hk_wins', wins);
        localStorage.setItem('hk_loss', losses);
        localStorage.setItem('hk_active', JSON.stringify(activeTrades));
        localStorage.setItem('hk_hist', document.getElementById('history-body').innerHTML);
        document.getElementById('total-wins').innerText = wins;
        document.getElementById('total-loss').innerText = losses;
    }

    function resetAll() { if(confirm("Reset System Data?")) { localStorage.clear(); location.reload(); } }
    document.getElementById('history-body').innerHTML = localStorage.getItem('hk_hist') || "";
    document.getElementById('total-wins').innerText = wins;
    document.getElementById('total-loss').innerText = losses;
    connect(); syncEngine(); setInterval(syncEngine, 25000);
</script>
</body>
</html>
