<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sognalbott - Smart Trading Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto mb-6">
        <div class="flex justify-between items-center bg-emerald-900/30 border border-emerald-500 text-emerald-400 p-3 rounded-lg mb-4">
            <span class="font-bold flex items-center gap-2">🟢 CONNECTED & REAL-TIME SYNCED</span>
            <span class="bg-emerald-500 text-slate-900 px-3 py-1 rounded text-xs font-black">ENGINE STATUS: ON (RUNNING)</span>
        </div>

        <div class="card p-6 grid grid-cols-3 gap-4 text-center">
            <div>
                <p class="text-xs text-gray-400 font-bold uppercase">💵 Futures Balance</p>
                <h2 id="balance-display" class="text-2xl font-black text-amber-400">$0.00</h2>
            </div>
            <div>
                <p class="text-xs text-gray-400 font-bold uppercase">✔️ Wins</p>
                <h2 id="wins-count" class="text-2xl font-black text-emerald-400">0</h2>
            </div>
            <div>
                <p class="text-xs text-gray-400 font-bold uppercase">❌ Loss</p>
                <h2 id="loss-count" class="text-2xl font-black text-rose-500">0</h2>
            </div>
        </div>

        <div class="mt-3 p-3 bg-blue-950/40 border border-blue-800 rounded-lg text-xs flex flex-wrap justify-between text-blue-300">
            <span id="current-margin-info">🔹 Active Margin: Calculating...</span>
            <span id="current-limit-info">🔹 Max Allowed Trades: Calculating...</span>
            <span class="text-amber-400">🚫 Anti-Block: BTC & ETH Automatically Ignored</span>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4" id="scanner-grid">
        </div>

    <div class="max-w-6xl mx-auto mt-6 text-center">
        <button onclick="resetStats()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 rounded-lg uppercase tracking-wider transition">
            Reset Everything
        </button>
    </div>

    <script>
        const API_URL = '/api';
        // 10 Setup Target Coins (Expensive coins like BTC and ETH are excluded from automated trading)
        const trackedCoins = ['PEPE', 'SHIB', 'BONK', 'FLOKI', 'WIF', 'DOGE', 'SOL', 'NEAR', 'XRP', 'ADA'];
        const leverage = 20;

        // Load or initialize stats
        let stats = JSON.parse(localStorage.getItem('bot_stats')) || { wins: 0, losses: 0, activeTrades: {} };

        // --- SMART RISK MANAGEMENT LOGIC ---
        function calculateDynamicRules(balance) {
            let margin = 0.30; // Default minimum margin
            let maxTrades = 3;  // Default minimum trades limit for $3 account

            if (balance <= 5) {
                margin = 0.30;
                maxTrades = 3;
            } else if (balance > 5 && balance <= 15) {
                margin = 0.40;
                maxTrades = 4;
            } else if (balance > 15 && balance <= 30) {
                margin = 0.60;
                maxTrades = 6;
            } else if (balance > 30 && balance <= 50) {
                margin = 1.00;
                maxTrades = 8;
            } else if (balance > 50) {
                // Scaling mode for bigger balances
                margin = parseFloat((balance * 0.02).toFixed(2)); // Always risk 2% of balance per trade
                maxTrades = 10; // Open all 10 coins if setup triggers
            }

            return { margin, maxTrades };
        }

        async function syncEngine() {
            try {
                // Fetch real account details from Binance via our Vercel API
                const res = await fetch(`${API_URL}?action=account`);
                const data = await res.json();
                
                let balance = parseFloat(data.availableBalance || 0);
                
                // Fallback for visual display if wallet is empty during testing
                if (balance === 0) balance = 3.00; 

                document.getElementById('balance-display').innerText = `$${balance.toFixed(2)}`;
                document.getElementById('wins-count').innerText = stats.wins;
                document.getElementById('loss-count').innerText = stats.losses;

                // Apply dynamic calculation rules
                const rules = calculateDynamicRules(balance);
                document.getElementById('current-margin-info').innerText = `🔹 Active Margin: $${rules.margin.toFixed(2)} (Size: $${(rules.margin * leverage).toFixed(2)})`;
                document.getElementById('current-limit-info').innerText = `🔹 Max Allowed Trades: ${rules.maxTrades}`;

                const currentRunningTrades = Object.keys(stats.activeTrades).length;

                // Render or update system layout grid
                const grid = document.getElementById('scanner-grid');
                grid.innerHTML = '';

                for (let coin of trackedCoins) {
                    // Fetch live status for current symbol
                    const signalRes = await fetch(`${API_URL}?symbol=${coin}USDT`);
                    const signalData = await signalRes.json();

                    const isTradeRunning = stats.activeTrades[coin] ? true : false;
                    let statusHtml = `<p class="text-xs text-gray-500 animate-pulse">Searching 1H Crossover...</p>`;
                    let cardBorder = 'border-#30363d';

                    if (isTradeRunning) {
                        const currentTrade = stats.activeTrades[coin];
                        cardBorder = currentTrade.type === 'LONG' ? 'border-emerald-500 ring-1 ring-emerald-500' : 'border-rose-500 ring-1 ring-rose-500';
                        statusHtml = `
                            <div class="mt-2 pt-2 border-t border-gray-800 text-xs">
                                <span class="font-bold ${currentTrade.type === 'LONG' ? 'text-emerald-400' : 'text-rose-400'}">🔥 ACTIVE ${currentTrade.type}</span>
                                <div class="grid grid-cols-2 gap-1 mt-1 text-gray-400">
                                    <div>Entry: ${currentTrade.entry}</div>
                                    <div>Margin: $${currentTrade.margin}</div>
                                    <div class="text-emerald-400">Target: ${currentTrade.tp}</div>
                                    <div class="text-rose-400">SL: ${currentTrade.sl}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        statusHtml = `<p class="text-xs text-emerald-400 bg-emerald-950/30 p-1 rounded text-center font-bold">Trend Line: ${signalData.trend === 1 ? 'BULLISH' : 'BEARISH'}</p>
                                      <p class="text-[10px] text-gray-500 mt-1 text-center">Awaiting Strategy Crossover Alignment...</p>`;
                    }

                    grid.innerHTML += `
                        <div class="card p-4 flex flex-col justify-between border-2 ${cardBorder}">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="font-black text-lg tracking-wider">${coin}</h3>
                                <span class="text-xs font-mono text-gray-400">Lev: ${leverage}x</span>
                            </div>
                            ${statusHtml}
                        </div>
                    `;

                    // --- AUTOMATED ORDER TRIGGER SYSTEM ---
                    // Conditions: Only trigger if under max active limit, coin doesn't have an active trade, and crossover triggers execution
                    if (currentRunningTrades < rules.maxTrades && !isTradeRunning && signalData.ts4 !== 0) {
                        const tradeType = signalData.ts4 === 1 ? 'LONG' : 'SHORT';
                        
                        // Double protection fallback: Skip if somehow request belongs to premium heavy weights
                        if (coin === 'BTC' || coin === 'ETH') continue;

                        // Execute live automated order request to backend
                        const orderPayload = {
                            action: 'order',
                            symbol: `${coin}USDT`,
                            side: tradeType,
                            margin: rules.margin,
                            leverage: leverage
                        };

                        const orderRes = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderPayload)
                        });

                        const orderResult = await orderRes.json();

                        if (orderResult.success) {
                            // Register trade into current tracking pipeline
                            stats.activeTrades[coin] = {
                                type: tradeType,
                                entry: orderResult.entryPrice,
                                margin: rules.margin,
                                tp: orderResult.tp,
                                sl: orderResult.sl
                            };
                            localStorage.setItem('bot_stats', JSON.stringify(stats));
                        }
                    }
                }

            } catch (err) {
                console.error("Sync Engine Error: ", err);
            }
        }

        function resetStats() {
            if(confirm("Kia aap waqai poora data clear karna chahte hain?")) {
                localStorage.removeItem('bot_stats');
                stats = { wins: 0, losses: 0, activeTrades: {} };
                syncEngine();
            }
        }

        // Run execution sync loop every 25 seconds
        setInterval(syncEngine, 25000);
        window.onload = syncEngine;
    </script>
</body>
</html>
