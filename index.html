<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0b0e11; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .dashboard { display: flex; justify-content: space-around; background: #1e2329; padding: 15px; border-radius: 12px; border: 1px solid #f0b90b; margin-bottom: 10px; text-align: center; border: 1px solid #444; }
        .win-text { color: #0ecb81; font-weight: bold; }
        .loss-text { color: #f6465d; font-weight: bold; }
        .scanner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .coin-card { background: #161a1e; border: 1px solid #333; padding: 10px; border-radius: 10px; font-size: 10px; min-height: 180px; transition: 0.3s; }
        .active-long { border: 2px solid #0ecb81; background: #0c2b1e; box-shadow: 0 0 10px #0ecb81; }
        .active-short { border: 2px solid #f6465d; background: #2b1111; box-shadow: 0 0 10px #f6465d; }
        .stats-box { font-size: 8px; color: #848e9c; margin-top: 5px; background: #2b3139; padding: 4px; border-radius: 4px; }
        .history-section { margin-top: 15px; background: #1e2329; padding: 10px; border-radius: 10px; height: 200px; overflow-y: auto; border: 1px solid #333; }
        table { width: 100%; font-size: 9px; text-align: left; }
        .reset-btn { width: 100%; background: #f6465d; border: none; padding: 10px; border-radius: 5px; color: #fff; margin-top: 10px; font-weight: bold; }
        
        .toggle-container { text-align: center; margin-bottom: 10px; }
        .toggle-btn { background: #0ecb81; border: none; color: white; padding: 8px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 11px; width: 100%; box-shadow: 0 0 8px rgba(14, 203, 129, 0.3); }
        .toggle-btn.bot-off { background: #f6465d; box-shadow: 0 0 8px rgba(246, 70, 93, 0.3); }
    </style>
</head>
<body>

<div id="net-status" style="text-align:center; font-size:9px; color:#f0b90b; margin-bottom:5px;">🚀 1-HOUR CROSSOVER ENGINE READY</div>

<div class="toggle-container">
    <button id="bot-toggle-btn" class="toggle-btn" onclick="toggleBot()">🤖 ENGINE STATUS: ON</button>
</div>

<div class="dashboard">
    <div>💵 REAL BALANCE<br><span id="balance" style="font-size:18px; color:#f0b90b;">Syncing...</span></div>
    <div>✅ WINS: <span id="total-wins" class="win-text">0</span></div>
    <div>❌ LOSS: <span id="total-loss" class="loss-text">0</span></div>
</div>

<div id="scanner" class="scanner-grid"></div>

<div class="history-section">
    <table id="history-table">
        <thead><tr><th>COIN</th><th>TYPE</th><th>NET PNL</th><th>RES</th></tr></thead>
        <tbody id="history-body"></tbody>
    </table>
    <button class="reset-btn" onclick="resetAll()">RESET EVERYTHING</button>
</div>

<script>
    const coins = ['pepeusdt','shibusdt','bonkusdt','flokiusdt','wifusdt','dogeusdt','solusdt','btcusdt','ethusdt','nearusdt'];
    
    // 🌐 VERCEL SERVER LINK CONNECTED
    const RENDER_SERVER_URL = "https://sognalbott.vercel.app/api"; 

    let virtualBalance = 0.00;
    let wins = parseInt(localStorage.getItem('hk_wins')) || 0;
    let losses = parseInt(localStorage.getItem('hk_loss')) || 0;
    let activeTrades = JSON.parse(localStorage.getItem('hk_active')) || {};
    let isBotOn = localStorage.getItem('hk_bot_state') !== 'OFF';
    
    let priceHistory = JSON.parse(localStorage.getItem('hk_price_history')) || {};
    let prevStochK = JSON.parse(localStorage.getItem('hk_prev_stochk')) || {};

    const scannerEl = document.getElementById('scanner');
    coins.forEach(s => {
        const sym = s.toUpperCase();
        scannerEl.innerHTML += `
            <div class="coin-card" id="card-${sym}">
                <b style="font-size:12px;">${sym.replace('USDT','')}</b> <span id="price-${sym}" style="float:right">---</span>
                <div class="stats-box">
                    K: <span id="k-${sym}">--</span> | D: <span id="d-${sym}">--</span> | Lev: 20x
                </div>
                <div id="info-${sym}" style="display:none; margin-top:10px; border-top:1px solid #444; padding-top:5px;">
                    <div id="pnl-${sym}" style="font-size:16px; font-weight:bold;">$0.00</div>
                    <div style="font-size:8px; margin-top:3px;">
                        Entry: <span id="ent-${sym}">0</span><br>
                        Margin: $<span id="marg-${sym}">0</span><br>
                        Target: <span id="tp-${sym}" style="color:#0ecb81">0</span><br>
                        Stop Loss: <span id="sl-${sym}" style="color:#f6465d">0</span>
                    </div>
                </div>
                <div id="sig-${sym}" style="color:#555; margin-top:8px; font-size:9px;">Searching 1H Cross...</div>
            </div>`;
        if (!priceHistory[sym]) priceHistory[sym] = [];
        if (!prevStochK[sym]) prevStochK[sym] = 50;
    });

    function updateBotToggleButtonUI() {
        const btn = document.getElementById('bot-toggle-btn');
        if (isBotOn) {
            btn.innerText = "🤖 ENGINE STATUS: ON (RUNNING)";
            btn.className = "toggle-btn";
        } else {
            btn.innerText = "⏸️ ENGINE STATUS: OFF (PAUSED)";
            btn.className = "toggle-btn bot-off";
        }
    }

    function toggleBot() {
        isBotOn = !isBotOn;
        localStorage.setItem('hk_bot_state', isBotOn ? 'ON' : 'OFF');
        updateBotToggleButtonUI();
    }

    // 📡 Har 10 seconds mein Binance ka Asli Balance check karne ka function
    async function fetchRealBinanceBalance() {
        try {
            const response = await fetch(RENDER_SERVER_URL);
            const data = await response.json();
            if (response.ok && data.balance) {
                virtualBalance = parseFloat(data.balance);
                document.getElementById('balance').innerText = "$" + virtualBalance.toFixed(2);
            }
        } catch (error) {
            console.error("Balance Sync Error:", error);
        }
    }

    function connect() {
        const socket = new WebSocket('wss://stream.binance.com:9443/ws/' + coins.map(c => c + '@ticker').join('/'));
        socket.onopen = () => {
            document.getElementById('net-status').innerText = "🟢 CONNECTED & REAL-TIME SYNCED";
            Object.keys(activeTrades).forEach(s => reloadUI(s));
        };
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const s = data.s, p = parseFloat(data.c);
            document.getElementById(`price-${s}`).innerText = p.toFixed(p < 0.001 ? 7 : 4);
            
            priceHistory[s].push(p);
            if (priceHistory[s].length > 100) priceHistory[s].shift(); 
            
            if (priceHistory[s].length >= 20) {
                const sig = getStoch(s);
                document.getElementById(`k-${s}`).innerText = sig.k.toFixed(0);
                document.getElementById(`d-${s}`).innerText = sig.d.toFixed(0);

                if (activeTrades[s]) {
                    updateTrade(s, p);
                } else if (isBotOn && Object.keys(activeTrades).length < 4) { 
                    if (prevStochK[s] <= sig.d && sig.k > sig.d && sig.k < 25) {
                        execute(s, p, 'LONG'); 
                    }
                    else if (prevStochK[s] >= sig.d && sig.k < sig.d && sig.k > 75) {
                        execute(s, p, 'SHORT'); 
                    }
                }
                prevStochK[s] = sig.k;
                localStorage.setItem('hk_prev_stochk', JSON.stringify(prevStochK));
            }
            localStorage.setItem('hk_price_history', JSON.stringify(priceHistory));
        };
        socket.onclose = () => setTimeout(connect, 3000);
    }

    function getStoch(sym) {
        let p = priceHistory[sym];
        let slice = p.slice(-14);
        let current = p[p.length-1];
        let min = Math.min(...slice), max = Math.max(...slice);
        let k = ((current - min) / ((max - min) || 0.0000001)) * 100;
        if (!this.kCache) this.kCache = {};
        if (!this.kCache[sym]) this.kCache[sym] = [];
        this.kCache[sym].push(k);
        if (this.kCache[sym].length > 5) this.kCache[sym].shift(); 
        let d = this.kCache[sym].reduce((a, b) => a + b) / this.kCache[sym].length;
        return { k, d };
    }

    function execute(s, entry, type) {
        // 💰 RISK CONTROL SETTING: Yahan sirf 0.10 cents ka trade margin liya jaye ga
        const margin = 0.10; 
        const tpDist = 0.018, slDist = 0.012; 
        let tp = type === 'LONG' ? (entry * (1 + tpDist)) : (entry * (1 - tpDist));
        let sl = type === 'LONG' ? (entry * (1 - slDist)) : (entry * (1 + slDist));
        
        activeTrades[s] = { entry, tp, sl, type, margin, leverage: 20 };
        saveState();
        reloadUI(s);

        // 📡 Real-time Signal Post to Vercel Server
        fetch(RENDER_SERVER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                symbol: s,
                type: type,
                entry: entry,
                tp: tp,
                sl: sl,
                margin: margin
            })
        })
        .then(res => res.json())
        .then(data => console.log("Binance Order Response:", data))
        .catch(err => console.error("Server Order Connection Error:", err));
    }

    function reloadUI(s) {
        const t = activeTrades[s];
        if(!t) return;
        const card = document.getElementById(`card-${s}`);
        card.className = `coin-card ${t.type==='LONG'?'active-long':'active-short'}`;
        document.getElementById(`info-${s}`).style.display = 'block';
        document.getElementById(`ent-${s}`).innerText = t.entry.toFixed(t.entry < 0.01 ? 6 : 4);
        document.getElementById(`marg-${s}`).innerText = t.margin.toFixed(2);
        document.getElementById(`tp-${s}`).innerText = t.tp.toFixed(t.entry < 0.01 ? 6 : 4);
        document.getElementById(`sl-${s}`).innerText = t.sl.toFixed(t.entry < 0.01 ? 6 : 4); 
        document.getElementById(`sig-${s}`).innerText = "🔥 ACTIVE " + t.type;
        updateStats();
    }

    function updateTrade(s, p) {
        const t = activeTrades[s];
        let diff = t.type === 'LONG' ? (p - t.entry) : (t.entry - p);
        let pnlPct = (diff / t.entry) * 100 * t.leverage;
        let pnlUsd = (t.margin * pnlPct) / 100;
        
        const pnlEl = document.getElementById(`pnl-${s}`);
        pnlEl.innerText = (pnlUsd >= 0 ? "+" : "") + "$" + pnlUsd.toFixed(2);
        pnlEl.style.color = pnlUsd >= 0 ? "#0ecb81" : "#f6465d";

        if (pnlPct >= 35) close(s, "WIN", pnlUsd); 
        else if (pnlPct <= -25) close(s, "LOSS", pnlUsd); 
    }

    function close(s, res, profit) {
        const fee = activeTrades[s].margin * 0.003; 
        const netProfitLoss = profit - fee; 
        
        if(res === "WIN") wins++; else losses++;
        
        const row = `<tr><td>${s.toUpperCase()}</td><td>${activeTrades[s].type}</td><td class="${netProfitLoss >= 0 ? 'win-text':'loss-text'}">${(netProfitLoss >= 0 ? "+" : "")}${netProfitLoss.toFixed(2)}</td><td>${res}</td></tr>`;
        document.getElementById('history-body').innerHTML = row + document.getElementById('history-body').innerHTML;
        
        document.getElementById(`card-${s}`).className = 'coin-card';
        document.getElementById(`info-${s}`).style.display = 'none';
        document.getElementById(`sig-${s}`).innerText = "Scanning 1H...";
        delete activeTrades[s];
        saveState();
        updateStats();
        fetchRealBinanceBalance(); // Trade close hote hi balance dubara sync hoga
    }

    function saveState() {
        localStorage.setItem('hk_wins', wins);
        localStorage.setItem('hk_loss', losses);
        localStorage.setItem('hk_hist', document.getElementById('history-body').innerHTML);
        localStorage.setItem('hk_active', JSON.stringify(activeTrades));
        localStorage.setItem('hk_price_history', JSON.stringify(priceHistory));
        localStorage.setItem('hk_prev_stochk', JSON.stringify(prevStochK));
    }

    function updateStats() {
        document.getElementById('total-wins').innerText = wins;
        document.getElementById('total-loss').innerText = losses;
    }

    function resetAll() { if(confirm("Start again?")) { localStorage.clear(); location.reload(); } }
    document.getElementById('history-body').innerHTML = localStorage.getItem('hk_hist') || "";
    
    updateBotToggleButtonUI(); 
    updateStats();
    connect();
    
    // 🔁 Initial Balance fetch aur har 10 seconds mein loop
    fetchRealBinanceBalance();
    setInterval(fetchRealBinanceBalance, 10000);
</script>
</body>
</html>
